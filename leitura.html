<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Velocidade de Leitura</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #e8e8f0; min-height: 100vh; padding: 20px; }
  .container { max-width: 560px; margin: 0 auto; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 28px; backdrop-filter: blur(10px); }
  h1 { font-size: 22px; margin-bottom: 6px; color: #fff; }
  .subtitle { font-size: 13px; color: #9ca3af; margin-bottom: 20px; }
  .motivacional { background: linear-gradient(135deg, rgba(236,72,153,0.15), rgba(139,92,246,0.15)); border: 1px solid rgba(236,72,153,0.3); border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; font-size: 14px; text-align: center; color: #fbcfe8; line-height: 1.5; animation: pop 0.4s ease; }
  @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .section { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
  .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #8b5cf6; margin-bottom: 12px; font-weight: 600; }
  label { display: block; font-size: 13px; color: #cbd5e1; margin-bottom: 6px; margin-top: 10px; }
  label:first-of-type { margin-top: 0; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  input[type="number"] { width: 100%; padding: 11px 13px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 15px; font-family: inherit; }
  input[type="number"]:focus { outline: none; border-color: #8b5cf6; background: rgba(139, 92, 246, 0.08); }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  button { width: 100%; padding: 13px; background: linear-gradient(135deg, #8b5cf6, #6366f1); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 14px; font-family: inherit; }
  button.secondary { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); }
  .result-box { background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(99,102,241,0.1)); border: 1px solid rgba(139,92,246,0.3); border-radius: 10px; padding: 16px; margin-top: 14px; }
  .stat { display: flex; justify-content: space-between; align-items: baseline; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .stat:last-child { border-bottom: none; }
  .stat-label { font-size: 13px; color: #9ca3af; }
  .stat-value { font-size: 16px; color: #fff; font-weight: 600; }
  .stat-value.big { font-size: 24px; color: #a78bfa; }
  .progress-bar { height: 10px; background: rgba(0,0,0,0.4); border-radius: 5px; overflow: hidden; margin: 14px 0 6px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #ec4899); transition: width 0.4s ease; }
  .progress-text { font-size: 12px; color: #cbd5e1; text-align: center; margin-bottom: 4px; }
  .saved-badge { display: inline-block; font-size: 10px; background: rgba(34,197,94,0.2); color: #4ade80; padding: 3px 8px; border-radius: 10px; margin-left: 8px; }
  .hint { font-size: 11px; color: #6b7280; margin-top: 6px; font-style: italic; }
</style>
</head>
<body>
<div class="container">
  <h1>📚 Calculadora de Leitura <span id="savedBadge" class="saved-badge" style="display:none">salvo</span></h1>
  <p class="subtitle">Calibre uma vez. Depois é só ir atualizando a página atual.</p>

  <div id="motivacional" class="motivacional">☕ Bora, futura doutora! Respira fundo e começa. O livro não vai se ler sozinho.</div>

  <div class="section">
    <div class="section-title">1. Calibração + tempo total</div>
    <label>Quantas páginas você leu no teste?</label>
    <input type="number" id="testPages" placeholder="Ex: 10" min="0.1" step="0.1">
    <label>Tempo gasto (min : seg)</label>
    <div class="row">
      <input type="number" id="testMin" placeholder="Min" min="0">
      <input type="number" id="testSec" placeholder="Seg" min="0" max="59">
    </div>
    <label>Total de páginas do livro/material</label>
    <input type="number" id="totalPages" placeholder="Ex: 450" min="1">
    <button onclick="calcularTotal()">Calcular tempo total</button>
    <div id="resultadoTotal"></div>
  </div>

  <div class="section">
    <div class="section-title">2. Acompanhamento — onde você parou</div>
    <label>Página atual</label>
    <input type="number" id="currentPage" placeholder="Ex: 87" min="0">
    <p class="hint">Atualiza sozinho enquanto você digita.</p>
    <div id="resultadoProgresso"></div>
  </div>

  <button class="secondary" onclick="limpar()">Limpar tudo</button>
</div>

<script>
const KEY = 'reading-calc-data-v2';
let velocidadeMinPorPag = null;
let totalPagsCache = null;

const FRASES = {
  inicio: [
    "☕ Bora, futura doutora! O livro não se lê sozinho.",
    "🧠 Neurônio acordado? Então partiu.",
    "📖 Primeira página é a mais pesada. Depois desanda.",
    "💪 Modo estudante ativado. Café na mão, foco no olho."
  ],
  comecou: [
    "🚀 Já saiu do zero! Pior parte ficou pra trás.",
    "👀 Tá indo... não para agora que tá bom.",
    "🔥 Ritmo pegando. Continua!",
    "☕ Mais um gole, mais uma página. Simples assim."
  ],
  quarto: [
    "🎯 25% já era! Olha você sendo produtiva.",
    "💅 Tá voando, hein? Continua nessa pegada.",
    "📚 1/4 do caminho. Bora pro próximo marco!",
    "🧃 Pausa pra água NÃO é pausa pra TikTok. Volta aqui."
  ],
  metade: [
    "🏆 METADE! Agora é ladeira abaixo.",
    "🎉 50%! Você oficialmente leu mais da metade.",
    "🔥 Do meio pra frente é só orgulho. Continua!",
    "💀 Desistir agora? Depois de TUDO isso? Nem pensar."
  ],
  reta: [
    "⚡ 75%! Tá vendo a linha de chegada?",
    "🏃‍♀️ Reta final! Não afrouxa agora.",
    "💎 Falta pouco, muito pouco. Foco!",
    "🎯 Já investiu tanto, vai largar agora? Claro que não."
  ],
  quase: [
    "🔥 TÁ NO FIM! Fecha esse livro hoje!",
    "🚨 Últimas páginas! Não dorme em cima!",
    "👑 Falta nadinha. Termina e senta na gloria.",
    "💥 Cê tá a um suspiro de finalizar. VAI!"
  ],
  fim: [
    "🎊 TERMINOU! Aplausos de pé pra doutora Sarinha!",
    "🏆 Livro finalizado! Agora pode se gabar.",
    "✨ Concluído! Anota aí na lista de vitórias.",
    "👑 Terminou. Respira. Bebe água. Próximo!"
  ]
};

function fraseAleatoria(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function atualizarMotivacional(progresso) {
  const el = document.getElementById('motivacional');
  let frase;
  if (progresso === null) frase = fraseAleatoria(FRASES.inicio);
  else if (progresso >= 100) frase = fraseAleatoria(FRASES.fim);
  else if (progresso >= 90) frase = fraseAleatoria(FRASES.quase);
  else if (progresso >= 70) frase = fraseAleatoria(FRASES.reta);
  else if (progresso >= 45) frase = fraseAleatoria(FRASES.metade);
  else if (progresso >= 20) frase = fraseAleatoria(FRASES.quarto);
  else if (progresso > 0) frase = fraseAleatoria(FRASES.comecou);
  else frase = fraseAleatoria(FRASES.inicio);

  if (el.textContent.trim() !== frase.trim()) {
    el.style.animation = 'none';
    el.offsetHeight;
    el.textContent = frase;
    el.style.animation = 'pop 0.4s ease';
  }
}

async function salvar() {
  const data = {
    testPages: document.getElementById('testPages').value,
    testMin: document.getElementById('testMin').value,
    testSec: document.getElementById('testSec').value,
    totalPages: document.getElementById('totalPages').value,
    currentPage: document.getElementById('currentPage').value
  };
  try {
    await window.storage.set(KEY, JSON.stringify(data));
    const badge = document.getElementById('savedBadge');
    badge.style.display = 'inline-block';
    setTimeout(() => badge.style.display = 'none', 1200);
  } catch(e) {}
}

async function carregar() {
  try {
    const r = await window.storage.get(KEY);
    if (r && r.value) {
      const d = JSON.parse(r.value);
      if (d.testPages) document.getElementById('testPages').value = d.testPages;
      if (d.testMin) document.getElementById('testMin').value = d.testMin;
      if (d.testSec) document.getElementById('testSec').value = d.testSec;
      if (d.totalPages) document.getElementById('totalPages').value = d.totalPages;
      if (d.currentPage) document.getElementById('currentPage').value = d.currentPage;
      if (d.testPages && (d.testMin || d.testSec) && d.totalPages) {
        calcularTotal();
        if (d.currentPage) calcularProgresso();
      }
    }
  } catch(e) {}
}

function formatTempo(h) {
  if (h < 0) h = 0;
  const totalMin = Math.round(h * 60);
  const H = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (H === 0) return `${m} min`;
  if (m === 0) return `${H}h`;
  return `${H}h ${m}min`;
}

function calcularTotal() {
  const testPages = parseFloat(document.getElementById('testPages').value);
  const testMin = parseInt(document.getElementById('testMin').value) || 0;
  const testSec = parseInt(document.getElementById('testSec').value) || 0;
  const totalPages = parseInt(document.getElementById('totalPages').value);
  const resDiv = document.getElementById('resultadoTotal');

  if (!testPages || (testMin === 0 && testSec === 0) || !totalPages) { resDiv.innerHTML = ''; return; }

  const tempoTestMin = testMin + (testSec / 60);
  velocidadeMinPorPag = tempoTestMin / testPages;
  totalPagsCache = totalPages;
  const pagPorMin = testPages / tempoTestMin;
  const tempoTotalH = (totalPages * velocidadeMinPorPag) / 60;
  const segPorPag = velocidadeMinPorPag * 60;

  resDiv.innerHTML = `
    <div class="result-box">
      <div class="stat"><span class="stat-label">Velocidade</span><span class="stat-value">${pagPorMin.toFixed(2)} pág/min</span></div>
      <div class="stat"><span class="stat-label">Tempo por página</span><span class="stat-value">${segPorPag.toFixed(0)} seg</span></div>
      <div class="stat" style="padding-top:12px"><span class="stat-label">⏱ Tempo total estimado</span><span class="stat-value big">${formatTempo(tempoTotalH)}</span></div>
    </div>`;

  salvar();
  if (document.getElementById('currentPage').value) calcularProgresso();
  else atualizarMotivacional(null);
}

function calcularProgresso() {
  const resDiv = document.getElementById('resultadoProgresso');
  if (velocidadeMinPorPag === null || totalPagsCache === null) {
    resDiv.innerHTML = '<p class="hint" style="color:#f87171">⚠ Calibre primeiro lá em cima.</p>'; return;
  }
  const currentPage = parseInt(document.getElementById('currentPage').value);
  if (isNaN(currentPage)) { resDiv.innerHTML = ''; atualizarMotivacional(null); return; }

  const lidas = Math.min(currentPage, totalPagsCache);
  const restante = Math.max(0, totalPagsCache - currentPage);
  const tempoRestanteH = (restante * velocidadeMinPorPag) / 60;
  const tempoJaLidoH = (lidas * velocidadeMinPorPag) / 60;
  const progresso = totalPagsCache > 0 ? (lidas / totalPagsCache * 100) : 0;

  resDiv.innerHTML = `
    <div class="result-box">
      <div class="progress-text">Página ${lidas} de ${totalPagsCache}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,progresso)}%"></div></div>
      <div class="progress-text" style="color:#9ca3af">${progresso.toFixed(1)}% concluído</div>
      <div style="margin-top:14px">
        <div class="stat"><span class="stat-label">Páginas restantes</span><span class="stat-value">${restante}</span></div>
        <div class="stat"><span class="stat-label">Tempo já investido</span><span class="stat-value">${formatTempo(tempoJaLidoH)}</span></div>
        <div class="stat" style="padding-top:12px"><span class="stat-label">⏳ Falta para terminar</span><span class="stat-value big">${formatTempo(tempoRestanteH)}</span></div>
      </div>
    </div>`;

  atualizarMotivacional(progresso);
  salvar();
}

async function limpar() {
  ['testPages','testMin','testSec','totalPages','currentPage'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('resultadoTotal').innerHTML = '';
  document.getElementById('resultadoProgresso').innerHTML = '';
  velocidadeMinPorPag = null; totalPagsCache = null;
  atualizarMotivacional(null);
  try { await window.storage.delete(KEY); } catch(e) {}
}

document.getElementById('currentPage').addEventListener('input', calcularProgresso);
carregar();
</script>
</body>
</html>
